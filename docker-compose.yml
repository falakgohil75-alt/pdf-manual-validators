version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: pdf-validator-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: pdf-validator
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - pdf-validator-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pdf-validator-backend
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/pdf-validator
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_here}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - pdf-validator-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pdf-validator-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_APP_NAME: PDF Manual Validator
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pdf-validator-network
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  pdf-validator-network:
    driver: bridge
